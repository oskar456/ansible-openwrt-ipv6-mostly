---

# Set up IPv6-mostly network for the IPv6-day
# Prerequisites:
# - set up IPv4 and IPv6 connectivity
# - make sure hbs branch is selected
# - set up SSH key authentication

- name: Set up additional IPv6 LAN network
  hosts: ipv6day-omnia
  tags:
    - lan6
  roles:
    - gekmihesg.openwrt
    - name: openwrt-lan6
      lan6_ports:
        - lan0
        - lan1
    - name: openwrt-jool
      jool_pool6: "64:ff9b::/96"
  tasks:
    - name: find LAN bridge device
      uci:
        command: find
        config: network
        type: device
        find:
          name: br-lan
      register: lan_device

    - name: remove lan0 and lan1 from LAN bridge
      uci:
        command: del_list
        config: network
        section: "{{ lan_device.section }}"
        option: ports
        value: "{{ item }}"
      loop:
        - lan0
        - lan1

    - name: commit uci changes
      tags:
        - commit
      uci:
        command: commit

- name: Enable PREF64 RA option and DHCP 108
  hosts: ipv6day-omnia
  tags:
     - config
  roles:
    - gekmihesg.openwrt
    - name: openwrt-dhcp108
    - name: openwrt-pref64
      pref64_value: "64:ff9b::/96"
      pref64_interfaces:
        - lan
        - lan6

- name: Set up wireless network
  hosts: ipv6day-omnia
  roles:
    - gekmihesg.openwrt
  tags:
     - wifi
  tasks:
    - name: revert UCI changes
      uci:
        command: revert

    - name: enable 5GHz radio
      uci:
        command: set
        config: wireless
        section: radio1
        value:
          channel: 48
          htmode: EHT160
          disabled: 0

    - name: set up LAN Wi-Fi
      uci:
        command: section
        config: wireless
        type: wifi-iface
        find:
          device: radio1
          mode: ap
          network: lan
        value:
          ssid: Den-IPv6
          encryption: sae-mixed
          key: Den-IPv6

    - name: set up LAN6 Wi-Fi
      uci:
        command: section
        config: wireless
        type: wifi-iface
        find:
          device: radio1
          mode: ap
          network: lan6
        value:
          ssid: Den-IPv6-v6only
          encryption: sae-mixed
          key: Den-IPv6

    - name: enable 6GHz radio
      uci:
        command: set
        config: wireless
        section: radio2
        value:
          channel: auto
          htmode: EHT320
          disabled: 0

    - name: set up LAN Wi-Fi
      uci:
        command: section
        config: wireless
        type: wifi-iface
        find:
          device: radio2
          mode: ap
          network: lan
        value:
          ssid: Den-IPv6
          encryption: sae
          key: Den-IPv6
          ieee80211w: 2

    - name: set up LAN6 Wi-Fi
      uci:
        command: section
        config: wireless
        type: wifi-iface
        find:
          device: radio2
          mode: ap
          network: lan6
        value:
          ssid: Den-IPv6-v6only
          encryption: sae
          key: Den-IPv6
          ieee80211w: 2

    - name: enable 2.4GHz radio
      uci:
        command: set
        config: wireless
        section: radio0
        value:
          channel: 11
          htmode: HE40
          disabled: 0

    - name: set up legacy LAN Wi-Fi
      uci:
        command: section
        config: wireless
        type: wifi-iface
        find:
          device: radio0
          mode: ap
          network: lan
        value:
          ssid: Den-IPv6-2.4-26
          encryption: psk2+ccmp
          key: Den-IPv6

    - name: commit UCI changes
      uci:
        command: commit

- name: Set up DNS64
  hosts: ipv6day-omnia
  tags:
    - dns64
  roles:
    - gekmihesg.openwrt
  tasks:
    - name: drop DNS64 config file
      copy:
        dest: /etc/kresd/dns64.conf
        content: |
          modules = { 'dns64' }
          trust_anchors.set_insecure({ 'b.9.f.f.4.6.0.0.ip6.arpa', })

    - name: revert UCI changes
      uci:
        command: revert
    - name: enable DNS64
      uci:
        command: set
        config: resolver
        section: kresd
        value:
          include_config: "/etc/kresd/dns64.conf"
    - name: commit UCI changes
      uci:
        command: commit

